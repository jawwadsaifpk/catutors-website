<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#F0F7FF" rx="16"/>

  <!-- Header bar -->
  <rect width="800" height="80" fill="#1D4ED8" rx="16"/>
  <rect y="64" width="800" height="16" fill="#1D4ED8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="700">English Tutoring in California</text>
  <text x="400" y="60" text-anchor="middle" fill="#BFDBFE" font-size="14">Key facts for California parents • catutors.com</text>

  <!-- Stat card 1 -->
  <rect x="30" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="115" y="158" text-anchor="middle" fill="#DC2626" font-size="48" font-weight="800">&lt;50%</text>
  <text x="115" y="182" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">of CA students meet</text>
  <text x="115" y="199" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">ELA standards</text>
  <text x="115" y="222" text-anchor="middle" fill="#6B7280" font-size="11">CAASPP statewide data</text>

  <!-- Stat card 2 -->
  <rect x="220" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="305" y="158" text-anchor="middle" fill="#1D4ED8" font-size="38" font-weight="800">$35–$90</text>
  <text x="305" y="181" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">average hourly rate</text>
  <text x="305" y="198" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">for English tutoring</text>
  <text x="305" y="222" text-anchor="middle" fill="#6B7280" font-size="11">varies by city and level</text>

  <!-- Stat card 3 -->
  <rect x="410" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="495" y="155" text-anchor="middle" fill="#059669" font-size="36" font-weight="800">6–8 wks</text>
  <text x="495" y="181" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">typical time to see</text>
  <text x="495" y="198" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">measurable improvement</text>
  <text x="495" y="222" text-anchor="middle" fill="#6B7280" font-size="11">with consistent sessions</text>

  <!-- Stat card 4 -->
  <rect x="600" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="685" y="155" text-anchor="middle" fill="#D97706" font-size="44" font-weight="800">25–32</text>
  <text x="685" y="181" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">students per class</text>
  <text x="685" y="198" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">in CA public schools</text>
  <text x="685" y="222" text-anchor="middle" fill="#6B7280" font-size="11">no 1-on-1 time available</text>

  <!-- Skills section -->
  <rect x="30" y="285" width="460" height="150" fill="white" rx="12"/>
  <text x="50" y="313" fill="#1D4ED8" font-size="14" font-weight="700">What English Tutors Teach in California</text>
  <line x1="50" y1="321" x2="470" y2="321" stroke="#E5E7EB" stroke-width="1"/>
  <text x="60" y="343" fill="#374151" font-size="12">• Reading fluency and phonics (elementary)</text>
  <text x="60" y="363" fill="#374151" font-size="12">• Essay writing and paragraph structure</text>
  <text x="60" y="383" fill="#374151" font-size="12">• Literary analysis and AP English exam prep</text>
  <text x="60" y="403" fill="#374151" font-size="12">• SAT / ACT verbal and reading sections</text>
  <text x="60" y="423" fill="#374151" font-size="12">• College application essay coaching</text>

  <!-- Grade levels box -->
  <rect x="510" y="285" width="260" height="150" fill="#1D4ED8" rx="12"/>
  <text x="640" y="313" text-anchor="middle" fill="white" font-size="14" font-weight="700">Grade Levels Served</text>
  <line x1="530" y1="321" x2="750" y2="321" stroke="#3B82F6" stroke-width="1"/>
  <text x="640" y="344" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ Elementary (Grades K–5)</text>
  <text x="640" y="364" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ Middle School (Grades 6–8)</text>
  <text x="640" y="384" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ High School (Grades 9–12)</text>
  <text x="640" y="404" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ College &amp; Adult Learners</text>
  <text x="640" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="600">catutors.com</text>
</svg>
