<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#FFF5F5" rx="16"/>

  <!-- Header -->
  <rect width="800" height="80" fill="#B91C1C" rx="16"/>
  <rect y="64" width="800" height="16" fill="#B91C1C"/>
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="21" font-weight="700">California School Discipline: The Data</text>
  <text x="400" y="60" text-anchor="middle" fill="#FECACA" font-size="13">2021–22 California Dept. of Education · Statewide public school data</text>

  <!-- Stat 1: Total suspensions -->
  <rect x="30" y="105" width="200" height="155" fill="white" rx="12"/>
  <text x="130" y="148" text-anchor="middle" fill="#B91C1C" font-size="36" font-weight="800">280,000+</text>
  <text x="130" y="172" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">California students</text>
  <text x="130" y="190" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">suspended at least once</text>
  <text x="130" y="210" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">in a single school year</text>
  <text x="130" y="245" text-anchor="middle" fill="#9CA3AF" font-size="10">Even after pandemic-era reforms</text>

  <!-- Stat 2: Racial disparity -->
  <rect x="245" y="105" width="180" height="155" fill="white" rx="12"/>
  <text x="335" y="148" text-anchor="middle" fill="#B91C1C" font-size="52" font-weight="800">4×</text>
  <text x="335" y="172" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">Black students</text>
  <text x="335" y="190" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">suspended vs.</text>
  <text x="335" y="208" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">white peers</text>
  <text x="335" y="245" text-anchor="middle" fill="#9CA3AF" font-size="10">Systemic racial disparity</text>

  <!-- Stat 3: Disability disparity -->
  <rect x="440" y="105" width="180" height="155" fill="white" rx="12"/>
  <text x="530" y="148" text-anchor="middle" fill="#B91C1C" font-size="52" font-weight="800">2×</text>
  <text x="530" y="172" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">students with</text>
  <text x="530" y="190" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">disabilities suspended</text>
  <text x="530" y="208" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">vs. general ed peers</text>
  <text x="530" y="245" text-anchor="middle" fill="#9CA3AF" font-size="10">Despite federal IEP protections</text>

  <!-- Stat 4: Dropout risk -->
  <rect x="635" y="105" width="135" height="155" fill="#B91C1C" rx="12"/>
  <text x="702" y="148" text-anchor="middle" fill="white" font-size="46" font-weight="800">+20%</text>
  <text x="702" y="172" text-anchor="middle" fill="#FECACA" font-size="12" font-weight="600">dropout risk</text>
  <text x="702" y="190" text-anchor="middle" fill="#FECACA" font-size="12" font-weight="600">per suspension</text>
  <text x="702" y="212" text-anchor="middle" fill="#FCA5A5" font-size="11">UCLA research</text>
  <text x="702" y="230" text-anchor="middle" fill="#FCA5A5" font-size="11">on suspension</text>
  <text x="702" y="248" text-anchor="middle" fill="#FCA5A5" font-size="11">outcomes</text>

  <!-- Visual bar chart: top suspension reasons -->
  <rect x="30" y="278" width="385" height="158" fill="white" rx="12"/>
  <text x="222" y="302" text-anchor="middle" fill="#B91C1C" font-size="13" font-weight="700">Top Suspension Reasons in CA</text>
  <line x1="50" y1="310" x2="395" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <!-- bar 1 -->
  <text x="50" y="330" fill="#374151" font-size="11">Willful Defiance (now banned K–12)</text>
  <rect x="50" y="335" width="240" height="14" fill="#FECACA" rx="3"/>
  <rect x="50" y="335" width="240" height="14" fill="#B91C1C" rx="3" opacity="0.7"/>
  <text x="295" y="347" fill="#374151" font-size="10">historically #1</text>
  <!-- bar 2 -->
  <text x="50" y="366" fill="#374151" font-size="11">Disruption / Defiance (reclassified)</text>
  <rect x="50" y="371" width="180" height="14" fill="#B91C1C" rx="3" opacity="0.55"/>
  <text x="235" y="383" fill="#374151" font-size="10">rising</text>
  <!-- bar 3 -->
  <text x="50" y="402" fill="#374151" font-size="11">Physical Altercation</text>
  <rect x="50" y="407" width="100" height="14" fill="#B91C1C" rx="3" opacity="0.4"/>
  <!-- bar 4 -->
  <text x="50" y="423" fill="#374151" font-size="11">Drug / Alcohol Related</text>
  <rect x="50" y="428" width="60" height="12" fill="#B91C1C" rx="3" opacity="0.3"/>

  <!-- Solutions box -->
  <rect x="430" y="278" width="340" height="158" fill="white" rx="12"/>
  <text x="600" y="302" text-anchor="middle" fill="#15803D" font-size="13" font-weight="700">What Works: Restorative Justice</text>
  <line x1="450" y1="310" x2="750" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <text x="450" y="332" fill="#374151" font-size="11">✓  Schools with RJ programmes cut</text>
  <text x="450" y="349" fill="#374151" font-size="11">    suspensions by up to 40%</text>
  <text x="450" y="372" fill="#374151" font-size="11">✓  CA invested in RJ pilots since 2019</text>
  <text x="450" y="395" fill="#374151" font-size="11">✓  1-on-1 tutoring reduces re-suspension</text>
  <text x="450" y="412" fill="#374151" font-size="11">    by closing the academic gaps</text>
  <text x="450" y="432" fill="#374151" font-size="11">    that drive disengagement</text>
</svg>
