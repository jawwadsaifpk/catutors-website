<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#F0F7FF" rx="16"/>

  <!-- Header bar -->
  <rect width="800" height="80" fill="#1D4ED8" rx="16"/>
  <rect y="64" width="800" height="16" fill="#1D4ED8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="700">California Teen Mental Health Crisis</text>
  <text x="400" y="60" text-anchor="middle" fill="#BFDBFE" font-size="14">Key statistics from CDC, California Dept. of Education &amp; peer-reviewed research</text>

  <!-- Stat card 1 -->
  <rect x="30" y="110" width="170" height="150" fill="white" rx="12" filter="url(#shadow)"/>
  <text x="115" y="160" text-anchor="middle" fill="#1D4ED8" font-size="52" font-weight="800">94%</text>
  <text x="115" y="185" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">of CA teens report</text>
  <text x="115" y="202" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">significant school stress</text>
  <text x="115" y="222" text-anchor="middle" fill="#6B7280" font-size="11">each school year</text>

  <!-- Stat card 2 -->
  <rect x="220" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="305" y="160" text-anchor="middle" fill="#1D4ED8" font-size="52" font-weight="800">42%</text>
  <text x="305" y="185" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">report persistent</text>
  <text x="305" y="202" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">sadness or hopelessness</text>
  <text x="305" y="222" text-anchor="middle" fill="#6B7280" font-size="11">CDC Youth Risk Survey 2023</text>

  <!-- Stat card 3 -->
  <rect x="410" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="495" y="155" text-anchor="middle" fill="#DC2626" font-size="48" font-weight="800">+70%</text>
  <text x="495" y="180" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">rise in teen mental</text>
  <text x="495" y="197" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">health ER visits</text>
  <text x="495" y="222" text-anchor="middle" fill="#6B7280" font-size="11">since 2016 in California</text>

  <!-- Stat card 4 -->
  <rect x="600" y="110" width="170" height="150" fill="white" rx="12"/>
  <text x="685" y="155" text-anchor="middle" fill="#DC2626" font-size="44" font-weight="800">500:1</text>
  <text x="685" y="183" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">student-to-counselor</text>
  <text x="685" y="200" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">ratio in many districts</text>
  <text x="685" y="222" text-anchor="middle" fill="#6B7280" font-size="11">recommended: 250:1</text>

  <!-- Warning signs section -->
  <rect x="30" y="285" width="460" height="150" fill="white" rx="12"/>
  <text x="50" y="313" fill="#1D4ED8" font-size="14" font-weight="700">⚠ Top Warning Signs to Watch For</text>
  <line x1="50" y1="320" x2="470" y2="320" stroke="#E5E7EB" stroke-width="1"/>
  <text x="60" y="342" fill="#374151" font-size="12">• Sudden drop in grades or homework avoidance</text>
  <text x="60" y="362" fill="#374151" font-size="12">• Withdrawing from friends and family</text>
  <text x="60" y="382" fill="#374151" font-size="12">• Disrupted sleep — too much or too little</text>
  <text x="60" y="402" fill="#374151" font-size="12">• Extreme anxiety around tests and deadlines</text>
  <text x="60" y="422" fill="#374151" font-size="12">• Frequent unexplained headaches or stomach aches</text>

  <!-- Action box -->
  <rect x="510" y="285" width="260" height="150" fill="#1D4ED8" rx="12"/>
  <text x="640" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="700">What Helps Most</text>
  <line x1="530" y1="322" x2="750" y2="322" stroke="#3B82F6" stroke-width="1"/>
  <text x="640" y="344" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ Open conversations at home</text>
  <text x="640" y="364" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ Early professional support</text>
  <text x="640" y="384" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ Closing academic gaps</text>
  <text x="640" y="404" text-anchor="middle" fill="#BFDBFE" font-size="12">✓ 1-on-1 tutoring for confidence</text>
  <text x="640" y="430" text-anchor="middle" fill="white" font-size="11" font-weight="600">catutors.com</text>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>
</svg>
